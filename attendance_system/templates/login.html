{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-lg-5">
        <div class="glass-card p-4 p-lg-5">
            <div class="text-center mb-4">
                <div class="brand-icon large mb-3"><i class="fa-solid fa-camera-retro"></i></div>
                <h2 class="fw-bold">Welcome Back</h2>
                <p class="text-muted">Access the AI powered attendance system</p>
            </div>
            <form method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="d-flex justify-content-between mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="remember" value="1">
                        <label class="form-check-label">Remember me</label>
                    </div>
                    <a href="#" class="text-decoration-none">Forgot password?</a>
                </div>
                <button class="btn btn-primary w-100 py-2">Login</button>
            </form>
            <div class="text-center mt-4">
                <span class="text-muted">New here?</span>
                <a href="{{ url_for('register') }}" class="ms-2">Create account</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

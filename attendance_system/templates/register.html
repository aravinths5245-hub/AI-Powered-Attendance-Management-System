{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-lg-6">
        <div class="glass-card p-4 p-lg-5">
            <div class="text-center mb-4">
                <div class="brand-icon large mb-3"><i class="fa-solid fa-user-plus"></i></div>
                <h2 class="fw-bold">Create Account</h2>
                <p class="text-muted">Set up your administrator account</p>
            </div>
            <form method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="full_name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Role</label>
                    <select name="role" class="form-select">
                        <option value="admin">Admin</option>
                        <option value="faculty">Faculty</option>
                    </select>
                </div>
                <button class="btn btn-primary w-100 py-2">Register</button>
            </form>
            <div class="text-center mt-4">
                <span class="text-muted">Already have account?</span>
                <a href="{{ url_for('login') }}" class="ms-2">Login now</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block page_title %}Profile{% endblock %}
{% block content %}
<div class="glass-card p-4">
    <div class="d-flex align-items-center gap-3 mb-4">
        <div class="brand-icon large"><i class="fa-solid fa-user"></i></div>
        <div>
            <h4 class="mb-1">{{ current_user.full_name }}</h4>
            <p class="text-muted mb-0">{{ current_user.role|title }} Account</p>
        </div>
    </div>
    <div class="row g-3">
        <div class="col-md-6"><div class="setting-card"><h6>Email</h6><p>{{ current_user.email }}</p></div></div>
        <div class="col-md-6"><div class="setting-card"><h6>Role</h6><p>{{ current_user.role|title }}</p></div></div>
    </div>
</div>
{% endblock %}
